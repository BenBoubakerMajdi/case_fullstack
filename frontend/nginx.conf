server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api requests to the FastAPI backend
    # This avoids CORS issues in production — frontend and backend
    # appear to be on the same origin from the browser's perspective
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Required for SSE streaming — disables nginx buffering
        # Without this, SSE events are batched and not streamed in real time
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # SPA fallback — all non-file routes serve index.html
    # Required for React Router (if added in the future)
    location / {
        try_files $uri $uri/ /index.html;
    }
}