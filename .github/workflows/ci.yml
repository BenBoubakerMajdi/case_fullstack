# =============================================================================
# Matr — Continuous Integration
# =============================================================================
# Runs on every push and pull request to main.
#
# Jobs:
#   backend  — Python type checking + import validation
#   frontend — TypeScript type checking + lint + build verification

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  # ---------------------------------------------------------------------------
  # Backend — Python checks
  # ---------------------------------------------------------------------------
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports resolve correctly
        run: |
          python -c "from agent.agent import create_agent"
          python -c "from agent.context import AgentContext"
          python -c "from agent.prompt import get_system_prompt"
          python -c "from agent.tools.query_data import query_data"
          python -c "from agent.tools.visualize_web import visualize_web"
          python -c "from backend.main import app"
          python -c "from backend.schemas import ChatRequest, SSEEvent"
          python -c "from backend.routes.chat import router"
          python -c "from backend.services.stream import stream_agent_response"

      - name: Check no syntax errors
        run: |
          python -m py_compile agent/agent.py
          python -m py_compile agent/context.py
          python -m py_compile agent/prompt.py
          python -m py_compile agent/tools/query_data.py
          python -m py_compile agent/tools/visualize_web.py
          python -m py_compile backend/main.py
          python -m py_compile backend/schemas.py
          python -m py_compile backend/routes/chat.py
          python -m py_compile backend/services/stream.py

      - name: Verify FastAPI app starts
        env:
          OPENAI_API_KEY: "sk-fake-key-for-ci"
          MODEL: "openai:gpt-4o"
        run: |
          python -c "
          from backend.main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          response = client.get('/health')
          assert response.status_code == 200
          assert response.json()['status'] == 'ok'
          print('Health check passed')
          "

  # ---------------------------------------------------------------------------
  # Frontend — TypeScript + build checks
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build